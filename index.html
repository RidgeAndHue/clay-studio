<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ridge & Hue — Clay Avatar Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main style="max-width: 600px; margin: 40px auto; padding: 20px; font-family: system-ui, sans-serif;">
        <h2>Submit a Commission Request</h2>
        <p>Fill out the details below to request your custom clay avatar build.</p>
        
        <form>
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; font-weight: bold;">Your Name:</label>
                <input type="text" placeholder="Legal or preferred name" required style="width: 100%; padding: 8px; box-sizing: border-box;">
            </div>

            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; font-weight: bold;">Build Type:</label>
                <select style="width: 100%; padding: 8px; box-sizing: border-box;">
                    <option value="Head Only">Head Only (₱500)</option>
                    <option value="Full Body Figure">Full Body Figure (₱1,200)</option>
                    <option value="Chibi / Mascot">Chibi / Mascot (₱800)</option>
                </select>
            </div>

            <button type="submit" style="background: #ff758f; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold;">
                Submit Commission Request
            </button>
        </form>
    </main>

    <script src="script.js"></script>
</body>
</html>
